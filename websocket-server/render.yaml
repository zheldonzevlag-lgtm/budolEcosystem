services:
  - type: web
    name: budol-websocket-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    # Note: Free tier spins down after 15m inactivity. 
    # Use internal networking for backend-to-socket triggers if possible (Render Private Network).
