        .search-input {

            border-radius: 8px;
            font-size: 1em;
            background: rgba(255,255,255,0.2);
            color: white;

        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255,255,255,0.3);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.8);
        }

        .main-container {
            display: flex;
            min-height: calc(100vh - 200px);
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
            position: sticky;
            top: 200px;
        }

        .sidebar h2 {
            font-size: 1.1em;
            color: #2d3748;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .category {
            margin-bottom: 25px;
        }

        .category-title {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95em;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #f7fafc;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .category-title:hover {
            background: #edf2f7;
        }

        .category-title.active {
            background: #e6fffa;
            color: #667eea;
        }

        .category-toggle {
            font-size: 0.8em;
            transition: transform 0.2s;
        }

        .category-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .doc-list {
            list-style: none;
            margin-left: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .doc-list.expanded {
            max-height: 2000px;
        }

        .doc-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
            color: #4a5568;
        }

        .doc-item:hover {
            background: #edf2f7;
            color: #667eea;
        }

        .doc-item.active {
            background: #667eea;
            color: white;
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

            color: #2d3748;
            margin-bottom: 10px;

            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0;
            min-height: 600px;
        }

        .doc-viewer iframe {
            width: 100%;
            height: calc(100vh - 250px);
            border: none;
            border-radius: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #4a5568;
        }

            display: flex;
            gap: 20px;
            margin-top: 15px;

        }

            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.9em;
            backdrop-filter: blur(10px);

            font-size: 0.9em;

        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

                flex-direction: column;
            }

                width: 100%;
                max-height: 300px;
                position: relative;
                top: 0;
            }

                height: 500px;
            }

            text-align: center;
            padding: 40px;
            color: #718096;
        }

            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Session Warning Modal Styles */
        .session-warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;

            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

            font-size: 1.5em;

            display: flex;
            align-items: center;

            padding: 15px;
            text-align: center;
            margin-bottom: 25px;

            color: #92400e;
            margin-top: 5px;
        }

        .session-warning-modal .button-group {

            gap: 15px;

            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;

            background: #e5e7eb;
            color: #374151;

        // Initialize the sidebar
        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            let html = '<h2>📂 Documentation Categories</h2>';

            Object.keys(documentation).forEach((categoryName, index) => {
                const category = documentation[categoryName];
                const categoryId = `category-${index}`;
                const isExpanded = category.expanded ? 'expanded' : '';
                const toggleClass = category.expanded ? '' : 'collapsed';

                html += `
                    <div class="category">
                        <div class="category-title ${category.expanded ? 'active' : ''}" onclick="toggleCategory('${categoryId}')">
                            <span>${categoryName}</span>
                            <span class="category-toggle ${toggleClass}">▼</span>
                        </div>
                        <ul class="doc-list ${isExpanded}" id="${categoryId}">
                            ${category.docs.map((doc, docIndex) => `
                                <li class="doc-item" onclick="loadDocument('${categoryName}', ${docIndex}, '${doc.path}')">
                                    ${doc.name}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            });

            sidebar.innerHTML = html;
        }

        // Toggle category expansion
        function toggleCategory(categoryId) {
            const list = document.getElementById(categoryId);
            const title = list.previousElementSibling;
            const toggle = title.querySelector('.category-toggle');

            if (list.classList.contains('expanded')) {
                list.classList.remove('expanded');
                toggle.classList.add('collapsed');
                title.classList.remove('active');
            } else {
                list.classList.add('expanded');
                toggle.classList.remove('collapsed');
                title.classList.add('active');
            }
        }

        // Store token for protected document password validation
        let protectedDocToken = null;

        // Show password protection modal
        function showPasswordModal(categoryName, docIndex, docPath, docName) {
            // Reset token
            protectedDocToken = null;
            
            const overlay = document.createElement('div');
            overlay.className = 'password-protection-overlay';
            overlay.id = 'password-protection-modal';

            overlay.innerHTML = `
                <div class="password-protection-modal">
                    <h2>
                        <span class="lock-icon">🔒</span>
                        Protected Document
                    </h2>
                    <p>This document is password-protected. Please request a password via email or enter the password if you have it:</p>
                    <div class="error-message" id="password-error">Access Denied. Incorrect password.</div>
                    <div id="email-sent-message" style="display: none; background: #d1fae5; border: 1px solid #10b981; color: #065f46; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9em;">
                        ✅ Password has been sent to your email. Please check your inbox. The password expires in 10 minutes.
                    </div>
                    <input 
                        type="text" 
                        id="document-password-input" 
                        placeholder="Enter password (case-insensitive)"
                        autofocus
                        onkeydown="if(event.key === 'Enter') document.getElementById('submit-password-btn').click()"
                    />
                    <div class="button-group">
                        <button class="btn-submit" id="submit-password-btn" onclick="handlePasswordSubmit('${categoryName}', ${docIndex}, '${docPath}', '${docName.replace(/'/g, "\\'")}')">
                            🔓 Access Document
                        </button>
                        <button class="btn-cancel" onclick="closePasswordModal()">
                            ❌ Cancel
                        </button>
                    </div>
                    <div style="margin-top: 15px; text-align: center;">
                        <button 
                            id="request-password-btn" 
                            onclick="requestDocumentPassword()" 
                            style="background: transparent; border: 1px solid #667eea; color: #667eea; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: all 0.2s;"
                            onmouseover="this.style.background='#667eea'; this.style.color='white';"
                            onmouseout="this.style.background='transparent'; this.style.color='#667eea';"
                        >
                            📧 Request Password via Email
                        </button>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);
            
            // Focus input after modal is added
            setTimeout(() => {
                const input = document.getElementById('document-password-input');
                if (input) input.focus();
            }, 100);
        }

        // Request document password via email
        async function requestDocumentPassword() {
            const btn = document.getElementById('request-password-btn');
            const emailMsg = document.getElementById('email-sent-message');
            const originalText = btn.innerHTML;
            
            // Disable button and show loading
            btn.disabled = true;
            btn.innerHTML = '📧 Sending...';
            btn.style.opacity = '0.6';
            btn.style.cursor = 'not-allowed';

            try {
                const response = await fetch('/api/knowledge-base/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action: 'request-doc-password' }),
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token for validation
                    protectedDocToken = data.token;
                    
                    // Show success message
                    emailMsg.style.display = 'block';
                    btn.innerHTML = '✅ Password Sent';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }, 3000);
                } else {
                    alert(data.error || 'Failed to send password. Please try again.');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                }
            } catch (error) {
                alert('Failed to request password. Please check your connection.');
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
            }
        }

        // Handle password submission
        async function handlePasswordSubmit(categoryName, docIndex, docPath, docName) {
            const input = document.getElementById('document-password-input');
            const errorMsg = document.getElementById('password-error');
            const password = input.value.trim();

            if (!password) {
                errorMsg.textContent = 'Please enter a password.';
                errorMsg.classList.add('show');
                return;
            }

            if (!protectedDocToken) {
                errorMsg.textContent = 'Please request a password via email first.';
                errorMsg.classList.add('show');
                return;
            }

            // Disable submit button
            const submitBtn = document.getElementById('submit-password-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Validating...';

            try {
                const response = await fetch('/api/knowledge-base/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'validate-doc-password',
                        token: protectedDocToken,
                        password: password,
                    }),
                });

                const data = await response.json();

                if (response.ok && data.valid) {
                    // Password is correct - load document
                    closePasswordModal();
                    loadDocumentContent(categoryName, docIndex, docPath, docName);
                } else {
                    // Password is incorrect
                    if (data.remainingAttempts !== undefined) {
                        errorMsg.textContent = `${data.error} ${data.remainingAttempts} attempt(s) remaining.`;
                    } else {
                        errorMsg.textContent = data.error || 'Access Denied. Incorrect password.';
                    }
                    errorMsg.classList.add('show');
                    input.value = '';
                    input.focus();
                    
                    // Reset token if max attempts or expired
                    if (response.status === 429 || response.status === 400) {
                        protectedDocToken = null;
                    }
                }
            } catch (error) {
                errorMsg.textContent = 'Failed to validate password. Please try again.';
                errorMsg.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '🔓 Access Document';
            }
        }

        // Close password modal
        function closePasswordModal() {
            const modal = document.getElementById('password-protection-modal');
            if (modal) {
                modal.remove();
            }
        }

        // Load document content (after password verification)
        function loadDocumentContent(categoryName, docIndex, docPath, docName) {
            const viewer = document.getElementById('contentViewer');

            // Show loading state
            viewer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading document...</p>
                </div>
            `;

            // Load document in iframe
            setTimeout(() => {
                viewer.innerHTML = `
                    <div class="content-header">
                        <div class="breadcrumb">
                            <a href="#" onclick="resetViewer(); return false;">Knowledge Base</a> / 
                            ${categoryName} / ${docName}
                        </div>
                        <h2>${docName}</h2>
                        <div class="meta">Category: ${categoryName} | Path: ${docPath}</div>
                    </div>
                    <div class="doc-viewer">
                        <iframe src="${docPath}" onload="this.style.opacity = 1"></iframe>
                    </div>
                `;
            }, 300);
        }

        // Load document into viewer
        function loadDocument(categoryName, docIndex, docPath) {
            const viewer = document.getElementById('contentViewer');
            const doc = documentation[categoryName].docs[docIndex];

            // Update active state
            document.querySelectorAll('.doc-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');

            // Check if document is protected
            if (doc.protected) {
                showPasswordModal(categoryName, docIndex, docPath, doc.name);
                return;
            }

            // Load non-protected document normally
            loadDocumentContent(categoryName, docIndex, docPath, doc.name);
        }

        // Reset viewer to empty state
        function resetViewer() {
            document.getElementById('contentViewer').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <h3>Welcome to BudolShap Knowledge Base</h3>
                    <p>Select a document from the sidebar to view its content</p>
                </div>
            `;
            document.querySelectorAll('.doc-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        // Search functionality
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query === '') {
                    // Reset to default view
                    document.querySelectorAll('.category').forEach(cat => {
                        cat.style.display = 'block';
                    });
                    document.querySelectorAll('.doc-item').forEach(item => {
                        item.style.display = 'block';
                    });
                    return;
                }

                // Search through all documents
                let hasResults = false;
                Object.keys(documentation).forEach((categoryName, catIndex) => {
                    const category = documentation[categoryName];
                    const categoryEl = document.querySelectorAll('.category')[catIndex];
                    let categoryHasResults = false;

                    category.docs.forEach((doc, docIndex) => {
                        const docItem = categoryEl.querySelectorAll('.doc-item')[docIndex];
                        const docName = doc.name.toLowerCase();
                        const docPath = doc.path.toLowerCase();

                        if (docName.includes(query) || docPath.includes(query)) {
                            docItem.style.display = 'block';
                            categoryHasResults = true;
                            hasResults = true;
                        } else {
                            docItem.style.display = 'none';
                        }
                    });

                    // Show/hide category based on results
                    if (categoryHasResults) {
                        categoryEl.style.display = 'block';
                        // Expand category if it has results
                        const list = categoryEl.querySelector('.doc-list');
                        const title = categoryEl.querySelector('.category-title');
                        if (!list.classList.contains('expanded')) {
                            list.classList.add('expanded');
                            title.querySelector('.category-toggle').classList.remove('collapsed');
                            title.classList.add('active');
                        }
                    } else {
                        categoryEl.style.display = 'none';
                    }
                });

                // Update stats
                if (!hasResults) {
                    // Could show "No results" message
                }
            });
        }

        // Calculate total documents
        function updateStats() {
            let totalDocs = 0;
            Object.keys(documentation).forEach(categoryName => {
                totalDocs += documentation[categoryName].docs.length;
            });
            document.getElementById('totalDocs').textContent = totalDocs;
            document.getElementById('totalCategories').textContent = Object.keys(documentation).length;
        }

        // Session expiration warning system
        let sessionCheckInterval = null;
        let warningShown = false;

        function checkSessionExpiration() {
            const expiresAt = localStorage.getItem('kb_session_expires');
            if (!expiresAt) {
                return; // No session found
            }

            const now = Date.now();
            const expirationTime = parseInt(expiresAt);
            const timeRemaining = expirationTime - now;

            // Check if session has expired
            if (timeRemaining <= 0) {
                clearInterval(sessionCheckInterval);
                endSession('Session expired');
                return;
            }

            // Show warning when 2 minutes remaining (2 * 60 * 1000 = 120000 ms)
            const twoMinutesInMs = 2 * 60 * 1000;
            if (timeRemaining <= twoMinutesInMs && !warningShown) {
                showSessionWarning(timeRemaining);
                warningShown = true;
            }
        }

        function formatTimeRemaining(ms) {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function showSessionWarning(timeRemaining) {
            // Remove existing warning if any
            const existingWarning = document.getElementById('session-warning-modal');
            if (existingWarning) {
                existingWarning.remove();
            }

            const overlay = document.createElement('div');
            overlay.className = 'session-warning-overlay';
            overlay.id = 'session-warning-modal';

            const timeDisplay = formatTimeRemaining(timeRemaining);

            overlay.innerHTML = `
                <div class="session-warning-modal">
                    <h2>
                        <span class="warning-icon">⚠️</span>
                        Session Expiring Soon
                    </h2>
                    <p>Your knowledge base session will expire in <strong>2 minutes</strong>. Please choose an action:</p>
                    <div class="time-remaining">
                        <div class="time">${timeDisplay}</div>
                        <div class="label">Time remaining</div>
                    </div>
                    <div class="button-group">
                        <button class="btn-extend" onclick="extendSession()">
                            🔄 Extend Session
                        </button>
                        <button class="btn-close" onclick="endSession('User closed session')">
                            ❌ Close & End Session
                        </button>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);

            // Update countdown every second
            let remaining = timeRemaining;
            const countdownInterval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    endSession('Session expired');
                } else {
                    const timeElement = overlay.querySelector('.time');
                    if (timeElement) {
                        timeElement.textContent = formatTimeRemaining(remaining);
                    }
                }
            }, 1000);
        }

        function extendSession() {
            // Set flag for main app to auto-show password modal
            localStorage.setItem('kb_extend_requested', 'true');
            
            // Try to open main application (remove /documentation/knowledge-base.html to get base URL)
            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/documentation'));
            
            // Open main app in new tab
            const mainAppWindow = window.open(baseUrl, '_blank');
            
            // Remove warning modal temporarily (it will come back if session expires)
            const warning = document.getElementById('session-warning-modal');
            if (warning) {
                warning.remove();
                warningShown = false; // Allow warning to show again if needed
            }
            
            // Show message
            alert('Main application opened in a new tab. Please use Ctrl+Shift+K or the password modal will appear automatically to request a new access code and extend your session.');
        }

        function endSession(reason) {
            // Clear session data
            localStorage.removeItem('kb_session_expires');
            localStorage.removeItem('kb_session_start');
            
            // Clear interval
            if (sessionCheckInterval) {
                clearInterval(sessionCheckInterval);
            }

            // Remove warning modal if exists
            const warning = document.getElementById('session-warning-modal');
            if (warning) {
                warning.remove();
            }

            // Show message and close
            alert(reason === 'Session expired' ? 'Your session has expired. Please authenticate again to continue.' : 'Session ended.');
            window.close();
        }

        // Make functions globally available
        window.extendSession = extendSession;
        window.endSession = endSession;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            setupSearch();
            updateStats();
            
            // Start checking session expiration every 5 seconds
            sessionCheckInterval = setInterval(checkSessionExpiration, 5000);
            checkSessionExpiration(); // Check immediately
        });

        // Make functions globally available
        window.toggleCategory = toggleCategory;
        window.loadDocument = loadDocument;
        window.resetViewer = resetViewer;
        window.handlePasswordSubmit = handlePasswordSubmit;
        window.closePasswordModal = closePasswordModal;
        window.requestDocumentPassword = requestDocumentPassword;
    </script>
