<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courier-Agnostic Shipping Documentation - BudolShap</title>
    <style>
        :root {
            --primary: #0f172a;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-item {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            transition: all 0.2s;
        }
        .link-item:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Courier-Agnostic Shipping Integration</h1>
        <div class="links">
            <a href="implementation-plan.html" class="link-item">
                📄 Full Implementation Plan & UI Mockup
            </a>
        </div>
    </div>
</body>
</html>
