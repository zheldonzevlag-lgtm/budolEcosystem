<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <script>
    // Robust error catching for all types of failures
    window.addEventListener('error', function(e) {
      console.error('Global Error Caught:', e.message || e.error);
      
      var diag = document.getElementById('error-diag');
      if (!diag) {
        diag = document.createElement('div');
        diag.id = 'error-diag';
        diag.style.position = 'fixed';
        diag.style.top = '20px';
        diag.style.right = '20px';
        diag.style.background = '#F43F5E';
        diag.style.color = 'white';
        diag.style.padding = '15px';
        diag.style.borderRadius = '8px';
        diag.style.zIndex = '10000';
        diag.style.maxWidth = '300px';
        diag.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
        document.body.appendChild(diag);
      }
      diag.innerHTML = '<strong>App Error:</strong><br>' + (e.message || 'Check console for details') + '<br><button onclick="location.reload(true)" style="margin-top:10px; background:white; color:#F43F5E; border:none; padding:5px 10px; border-radius:4px; cursor:pointer">Hard Reload</button>';
    }, true);

    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled Promise Rejection:', event.reason);
    });

    // Track frame initialization
    window.addEventListener('flutter-first-frame', function() {
      console.log('BudolPay: First frame rendered!');
      var splash = document.getElementById('splash');
      if (splash) splash.remove();
    });
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="budol_pay_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>budol_pay_mobile</title>
  <link rel="manifest" href="manifest.json">
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  <style id="splash-screen-style">
    html { height: 100% }
    body { margin: 0; min-height: 100%; background-color: #0F172A; }
    .center { margin: 0; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 20px; }
    #splash img { filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); max-width: 200px; }
  </style>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      console.log('BudolPay: removeSplashFromWeb called');
      var splash = document.getElementById("splash");
      if (splash) {
        splash.remove();
        console.log('BudolPay: Splash removed');
      }
      document.body.style.backgroundColor = "#0F172A";
    }
    
    // Fallback timer to ensure splash is removed even if engine hangs
    setTimeout(function() {
      if (!document.querySelector('flt-glass-pane')) {
         console.warn('BudolPay: Flutter engine still initializing or failed. Forcing splash removal.');
         removeSplashFromWeb();
      }
    }, 20000); // 20 seconds for slow DDC loads
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="icons/Icon-192.png 1x, icons/Icon-512.png 2x" media="(prefers-color-scheme: light)">
      <source srcset="icons/Icon-192.png 1x, icons/Icon-512.png 2x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="icons/Icon-192.png" alt="">
  </picture>
  
  <script>
    console.log('BudolPay: Bootstrapping Engine...');
  </script>
  <!-- Re-enabled async for standard Flutter initialization -->
  <script src="flutter_bootstrap.js" async></script>
</body></html>
