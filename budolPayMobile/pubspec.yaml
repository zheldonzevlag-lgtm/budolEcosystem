name: budol_pay_mobile
description: A new Flutter project for budolPay QR payments.
publish_to: 'none'
version: 1.3.69+169

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  mobile_scanner: ^7.1.4
  http: ^1.1.0
  url_launcher: ^6.3.2
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  package_info_plus: ^9.0.0
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  socket_io_client: ^3.0.0
  camera: ^0.11.3
  path_provider: ^2.1.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_face_detection: ^0.13.2
  image_picker: ^1.0.4
  http_parser: ^4.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  flutter_native_splash: ^2.3.10
  multicast_dns: ^0.3.2+2
  pusher_channels_flutter: ^2.2.0
  local_auth: ^3.0.0
  local_auth_android: ^2.0.4
  local_auth_darwin: ^2.0.1
  flutter_secure_storage: ^10.0.0
  flag_secure: ^2.0.2
  tflite_flutter: ^0.12.1
  image: ^4.1.3
  crypto: ^3.0.3
  smooth_page_indicator: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  windows: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 23
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#0F172A"
    theme_color: "#F43F5E"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/app_icon.png"
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/models/facenet.tflite
