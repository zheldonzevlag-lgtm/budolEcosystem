version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Flutter Web already built locally by agent. Proceeding to deploy artifacts."
    build:
      commands:
        - echo "Ensuring build/web exists"
        - ls -la budolPayMobile/build/web
  artifacts:
    baseDirectory: budolPayMobile/build/web
    files:
      - '**/*'
  cache:
    paths: []
