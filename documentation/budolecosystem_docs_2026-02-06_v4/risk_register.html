<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Risk Register - v4 (OTP Login)</title>
    <style>
        body { font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .high { color: #ff5630; font-weight: bold; }
        .medium { color: #ffab00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Risk Register: OTP Login System</h1>
    <table>
        <thead>
            <tr>
                <th>Risk ID</th>
                <th>Description</th>
                <th>Impact</th>
                <th>Probability</th>
                <th>Severity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>R-OTP-01</td>
                <td>SMS Delivery Failure (Provider Downtime)</td>
                <td>High</td>
                <td>Medium</td>
                <td class="high">High</td>
            </tr>
            <tr>
                <td>R-OTP-02</td>
                <td>OTP Brute Force Attack</td>
                <td>Medium</td>
                <td>Low</td>
                <td class="medium">Medium</td>
            </tr>
            <tr>
                <td>R-OTP-03</td>
                <td>SIM Swapping / Interception</td>
                <td>High</td>
                <td>Low</td>
                <td class="medium">Medium</td>
            </tr>
            <tr>
                <td>R-OTP-04</td>
                <td>Rate Limit Bypass</td>
                <td>Medium</td>
                <td>Low</td>
                <td class="medium">Medium</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
