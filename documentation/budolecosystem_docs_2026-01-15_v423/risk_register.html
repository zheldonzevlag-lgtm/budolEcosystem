<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Register - v423</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --secondary: #172b4d; --bg: #f4f5f7; --white: #ffffff; --border: #dfe1e6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--secondary); }
        .sidebar { width: 280px; background: #f4f5f7; height: 100vh; border-right: 1px solid var(--border); position: fixed; padding: 20px; overflow-y: auto; }
        .main-content { margin-left: 320px; padding: 40px; max-width: 900px; }
        .card { background: var(--white); border-radius: 8px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 1px rgba(9,30,66,.25); }
        .nav-link { display: block; padding: 8px 12px; color: #172b4d; text-decoration: none; border-radius: 4px; }
        .nav-link:hover { background: #ebecf0; }
        .nav-link.active { background: #deebff; color: var(--primary); font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #f4f5f7; }
        .severity-high { color: #de350b; font-weight: bold; }
        .severity-medium { color: #ff8b00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>v423 Documentation</h3>
        <nav>
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Overview</a>
            <a href="risk_register.html" class="nav-link active"><i class="fas fa-exclamation-triangle"></i> Risk Register</a>
        </nav>
    </div>

    <div class="main-content">
        <h1>Risk Register - v423</h1>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Risk ID</th>
                        <th>Description</th>
                        <th>Severity</th>
                        <th>Probability</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>R-423-01</td>
                        <td>PII Data Exposure (Phone/Address)</td>
                        <td class="severity-high">High</td>
                        <td>Low</td>
                        <td>Open</td>
                    </tr>
                    <tr>
                        <td>R-423-02</td>
                        <td>Incorrect Geocoding Data</td>
                        <td class="severity-medium">Medium</td>
                        <td>Medium</td>
                        <td>Open</td>
                    </tr>
                    <tr>
                        <td>R-423-03</td>
                        <td>API Overload from Map Searches</td>
                        <td class="severity-medium">Medium</td>
                        <td>Low</td>
                        <td>Open</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
