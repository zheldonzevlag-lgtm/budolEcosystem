    <h1>System Admin Manual - v418</h1>
    <h2>Database Maintenance</h2>
    <p>To ensure the database remains healthy, follow these steps:</p>
    <ol>
        <li>Verify PostgreSQL service is running on port 5432.</li>
        <li>Check connection string in <code>.env</code>.</li>
        <li>If "Table not found" errors occur, run <code>npx prisma db push</code>.</li>
    </ol>
