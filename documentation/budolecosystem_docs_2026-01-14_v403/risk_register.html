<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Risk Register - v403</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-12">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-black mb-6 uppercase tracking-tighter text-rose-600">Risk Register</h1>
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] font-bold uppercase text-slate-500">
                    <tr><th class="p-4">Risk ID</th><th class="p-4">Description</th><th class="p-4">Severity</th></tr>
                </thead>
                <tbody class="text-sm">
                    <tr><td class="p-4 font-mono">R-403-01</td><td class="p-4">Socket connection failure due to network latency or firewall rules.</td><td class="p-4 text-amber-600 font-bold uppercase">Medium</td></tr>
                    <tr><td class="p-4 font-mono">R-403-02</td><td class="p-4">State synchronization mismatch between client and server data.</td><td class="p-4 text-blue-600 font-bold uppercase">Low</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
