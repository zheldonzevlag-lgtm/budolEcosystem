    <h1>Mitigation Strategies - Version 417</h1>
    <ul>
        <li><strong>Network Timeout:</strong> A 5-second timeout is applied to the profile fetch to ensure the app doesn't hang on the splash screen in poor network conditions.</li>
        <li><strong>Local Fallback:</strong> If the network fetch fails, the app still uses the last known data from local storage.</li>
    </ul>
