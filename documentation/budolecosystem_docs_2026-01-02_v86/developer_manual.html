    <section>
        <h2>Camera Permissions</h2>
        <p>To support the QR scanner, developers must ensure that the following permissions are added to the mobile app's manifest/info.plist files:</p>
        <ul>
            <li><strong>Android:</strong> <code>android.permission.CAMERA</code></li>
            <li><strong>iOS:</strong> <code>NSCameraUsageDescription</code></li>
        </ul>
    </section>
