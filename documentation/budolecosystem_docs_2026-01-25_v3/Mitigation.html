<body>
    <h1>Mitigation Strategy</h1>
    <div class="strategy">
        <h3>Risk: Layout breakage due to long IDs (R-UI-001)</h3>
        <p><strong>Mitigation:</strong> Implemented <code>break-all</code> Tailwind class and <code>text-right</code> alignment with <code>ml-4</code> spacing. This ensures that long IDs wrap onto new lines if they exceed the container width, preventing layout overflow on mobile devices.</p>
