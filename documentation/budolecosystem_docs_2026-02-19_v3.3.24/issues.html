<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Issue Log - v3.3.24</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0052CC; --bg-main: #FFFFFF; --bg-sidebar: #F4F5F7; --text-main: #091E42; --border: #DFE1E6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); line-height: 1.6; margin: 0; display: flex; }
        .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0; padding: 24px; }
        .main-content { flex-grow: 1; padding: 40px 60px; max-width: 1200px; }
        h1 { color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #F4F5F7; font-weight: 600; color: #42526E; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Budol Ecosystem</h3>
        <p>v3.3.24</p>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 16px 0;">
        <nav>
            <div style="margin-bottom: 8px;"><a href="index.html" style="color: var(--text-main); text-decoration: none;">Release Index</a></div>
            <div style="margin-bottom: 8px;"><a href="issues.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Issue Log</a></div>
        </nav>
    </div>

    <div class="main-content">
        <h1>Issue Log</h1>
        <table>
            <thead>
                <tr>
                    <th>Issue ID</th>
                    <th>Reported By</th>
                    <th>Description</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>I-UX-002</td>
                    <td>User</td>
                    <td>Email address not prefilled in Edit Profile screen.</td>
                    <td>Resolved</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
