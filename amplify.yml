version: 1
applications:
  - appRoot: budolshap-0.1.0
    frontend:
      phases:
        preBuild:
          commands:
            - echo "=== Starting preBuild in $(pwd) ==="
            - npm ci
            - npx prisma generate --schema=prisma/schema.prisma
        build:
          commands:
            - echo "=== Starting build ==="
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*