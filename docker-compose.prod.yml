# Production Docker Compose for budolEcosystem Backend Services
# This file is used for local production testing before ECS deployment

services:
  # ============================================
  # Database Layer (Managed separately in AWS)
  # ============================================
  # postgres:
  #   image: postgres:15-alpine
  #   # In production, use AWS RDS PostgreSQL
  #   ports:
  #     - "5432:5432"

  # ============================================
  # budolID - SSO Service (Port 8000)
  # ============================================
  budolid:
    image: budolEcosystem/budolid:${VERSION:-latest}
    container_name: budolID-sso
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DATABASE_URL=${BUDOLID_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SSO_JWT_SECRET=${SSO_JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - BUDOLSHAP_DATABASE_URL=${BUDOLSHAP_DATABASE_URL}
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolAccounting Service (Port 8005)
  # ============================================
  budolaccounting:
    image: budolEcosystem/budolaccounting:${VERSION:-latest}
    container_name: budolAccounting
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=production
      - PORT=8005
      - DATABASE_URL=${BUDOLACCOUNTING_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - API Gateway (Port 8080)
  # ============================================
  budolpay-gateway:
    image: budolEcosystem/budolpay-gateway:${VERSION:-latest}
    container_name: budolpay-gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SERVICE_URL=http://budolpay-auth:8001
      - WALLET_SERVICE_URL=http://budolpay-wallet:8002
      - TRANSACTION_SERVICE_URL=http://budolpay-transaction:8003
      - PAYMENT_GATEWAY_URL=http://budolpay-payment:8004
      - SETTLEMENT_SERVICE_URL=http://budolpay-settlement:8007
      - VERIFICATION_SERVICE_URL=http://budolpay-kyc:8006
      - ACCOUNTING_SERVICE_URL=http://budolaccounting:8005
      - ID_SERVICE_URL=http://budolid:8000
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env.production
    depends_on:
      budolpay-auth:
        condition: service_started
      budolpay-wallet:
        condition: service_started
      budolpay-transaction:
        condition: service_started
      budolpay-payment:
        condition: service_started
      budolpay-settlement:
        condition: service_started
      budolpay-kyc:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - Auth Service (Port 8001)
  # ============================================
  budolpay-auth:
    image: budolEcosystem/budolpay-auth:${VERSION:-latest}
    container_name: budolpay-auth
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=production
      - PORT=8001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SSO_JWT_SECRET=${SSO_JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GATEWAY_URL=http://budolpay-gateway:8080
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - Wallet Service (Port 8002)
  # ============================================
  budolpay-wallet:
    image: budolEcosystem/budolpay-wallet:${VERSION:-latest}
    container_name: budolpay-wallet
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - PORT=8002
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GATEWAY_URL=http://budolpay-gateway:8080
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - Transaction Service (Port 8003)
  # ============================================
  budolpay-transaction:
    image: budolEcosystem/budolpay-transaction:${VERSION:-latest}
    container_name: budolpay-transaction
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
      - PORT=8003
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GATEWAY_URL=http://budolpay-gateway:8080
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - Payment Gateway Service (Port 8004)
  # ============================================
  budolpay-payment:
    image: budolEcosystem/budolpay-payment:${VERSION:-latest}
    container_name: budolpay-payment
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=production
      - PORT=8004
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GATEWAY_URL=http://budolpay-gateway:8080
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - Verification/KYC Service (Port 8006)
  # ============================================
  budolpay-kyc:
    image: budolEcosystem/budolpay-kyc:${VERSION:-latest}
    container_name: budolpay-kyc
    ports:
      - "8006:8006"
    environment:
      - NODE_ENV=production
      - PORT=8006
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GATEWAY_URL=http://budolpay-gateway:8080
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # budolPay - Settlement Service (Port 8007)
  # ============================================
  budolpay-settlement:
    image: budolEcosystem/budolpay-settlement:${VERSION:-latest}
    container_name: budolpay-settlement
    ports:
      - "8007:8007"
    environment:
      - NODE_ENV=production
      - PORT=8007
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GATEWAY_URL=http://budolpay-gateway:8080
      - ACCOUNTING_SERVICE_URL=http://budolaccounting:8005
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Redis Cache (Port 6379)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: budol-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - budol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Nginx Reverse Proxy (Port 80/443)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: budol-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - budolid
      - budolaccounting
      - budolpay-gateway
    networks:
      - budol-network
    restart: unless-stopped

networks:
  budol-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
